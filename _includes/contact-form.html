<form
  action="https://submit-form.com/{{ config.formspark_id }}"
  method="POST"
  data-botpoison-public-key="{{ config.botpoison_public_key }}"
>
  <input type="hidden" name="_botpoison" value="">
  <input type="hidden" name="_redirect" value="/pages/thank-you/">

  <p>
    <label for="contact-name">Your Name</label>
    <input type="text" id="contact-name" name="name" placeholder="Your name" required>
  </p>
  <p>
    <label for="contact-email">Email Address</label>
    <input type="email" id="contact-email" name="email" placeholder="Your email address" required>
  </p>
  <p>
    <label for="contact-phone">Phone Number</label>
    <input type="tel" id="contact-phone" name="phone" placeholder="Your phone number">
  </p>
  <p>
    <label for="contact-message">Your Message</label>
    <textarea id="contact-message" name="message" placeholder="Tell us about your event" required></textarea>
  </p>

  <button type="submit" class="button orange-bg">
    <span class="icon envelope"></span>Get In Touch
  </button>
</form>
<script src="https://unpkg.com/@botpoison/browser" async></script>
