name: Build and Deploy

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and Deploy
    runs-on: ubicloud-standard-8
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout Chobble Template
        uses: actions/checkout@v4
        with:
          repository: chobble-mirror/chobble-template
          ref: main
          path: template
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            .eleventy.js
            package.json
            bun.lock
            bunfig.toml
            flake.nix
            flake.lock
            bin
            scripts
            packages
            src

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Merge repos
        run: bun source/scripts/ci-merge.js template source combined

      - name: Update site.json with secrets
        run: |
          sed -i \
            's/"formspark_id": null/"formspark_id": "${{ secrets.FORMSPARK_ID }}"/g' \
            "combined/src/_data/config.json"
          sed -i \
            's/"botpoison_public_key": null/"botpoison_public_key": "${{ secrets.BOTPOISON_PUBLIC_KEY }}"/g' \
            "combined/src/_data/config.json"

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            combined/node_modules
            combined/.image-cache
          key: ${{ runner.os }}-bun-${{ hashFiles('combined/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Build with Bun
        run: |
          cd combined
          bun install --frozen-lockfile
          bun scripts/eleventy-build.js
          mkdir -p ../_site
          mv _site/* ../_site/

      - name: Normalise wp-* paths
        run: bun source/scripts/fix-wp-paths.js _site

      - name: Deploy to Bunny
        if: github.ref == 'refs/heads/main'
        uses: R-J-dev/bunny-deploy@v2.0.6
        with:
          access-key: ${{ secrets.BUNNY_ACCESS_KEY }}
          directory-to-upload: _site
          storage-endpoint: "https://storage.bunnycdn.com"
          storage-zone-name: ${{ secrets.BUNNY_PRODUCTION_STORAGE_ZONE_NAME }}
          storage-zone-password: ${{ secrets.BUNNY_PRODUCTION_STORAGE_ZONE_PASSWORD }}
          concurrency: "5"
          enable-delete-action: true
          enable-purge-pull-zone: true
          pull-zone-id: ${{ secrets.BUNNY_PRODUCTION_PULL_ZONE_ID }}
          replication-timeout: "15000"

  notify-failure:
    name: Notify on Failure
    runs-on: ubicloud-standard-8
    needs: [build]
    if: failure()
    steps:
      - name: Send failure notification
        uses: NiNiyas/ntfy-action@master
        with:
          url: 'https://ntfy.sh'
          topic: ${{ secrets.NTFY_TOPIC }}
