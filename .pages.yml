media:
  input: images
  output: /images
  path: images
  categories: [image]
content:

  - name: pages
    label: Pages
    path: pages
    type: collection
    subfolders: false
    view:
      fields: [permalink, meta_title, header_text]
      primary: header_text
      sort: [header_text]
    fields:
      - { name: header_image, type: image, label: Header Image }
      - { name: header_text, type: string, label: Header Text }
      - { name: subtitle, type: string, label: Subtitle }
      - { name: body, label: Body, type: code, options: { language: markdown } }
      - { name: meta_description, type: string, label: Meta Description }
      - { name: meta_title, type: string, label: Meta Title }
      - name: eleventyNavigation
        label: Navigation
        type: object
        fields:
          - { name: key, type: string }
          - { name: order, type: number }
          - { name: url, type: string }
      - { name: layout, type: string }
      - { name: permalink, type: string }
      
  - name: news
    label: News
    path: news
    type: collection
    subfolders: false
    fields:
      - { name: title, type: string, label: Title }
      - { name: header_image, type: image, label: Header Image }
      - { name: date, label: Date, type: date }
      - { name: subtitle, type: string, label: Subtitle }
      - { name: body, label: Body, type: code, options: { language: markdown } }
      - { name: header_text, type: string, label: Header Text }
      - { name: meta_description, type: string, label: Meta Description }
      - { name: meta_title, type: string, label: Meta Title }
      
  - name: products
    label: Products
    path: products
    type: collection
    subfolders: false
    exclude: ["index.html"]
    view:
      fields: [title, category_slug, article_modified_time]
      primary: title
      sort: [title]
    fields:
      - { name: title, type: string, label: Title }
      - { name: meta_title, type: string, label: SEO Title }
      - { name: meta_description, type: string, label: SEO Description }
      - name: galleryImages
        label: Gallery
        type: image
        options: { multiple: true }
      - { name: galleryAlt, type: string, label: Gallery Alt Text }
      - { name: description, label: Description, type: rich-text, options: { format: markdown } }
      - name: category_slug
        label: Category
        type: reference
        options:
          collection: categories
          search: "cat_head_title"
          value: "{filename}"
          label: "{cat_head_title}"
      - { name: category_name, type: string, label: Category Name (display) }
      - { name: share_description, type: string, label: Share Description }
      - { name: testimonial_body, type: rich-text, label: Testimonial, options: { format: markdown } }
      - { name: testimonial_attribution, type: string, label: Testimonial Attribution }
      - name: item_data
        label: Item Tags
        type: string
        list: true
      - name: upsells
        label: Upsells
        type: reference
        options:
          collection: products
          multiple: true
          search: "title"
          value: "{filename}"
          label: "{title}"
      - name: redirect_from
        label: Redirect From (legacy URLs)
        type: string
        list: true
      - { name: date_published, type: date, label: Date Published }
      - { name: article_modified_time, type: date, label: Last Modified }
      - { name: og_title, type: string, label: 'OG Title (override)' }
      - { name: og_description, type: string, label: 'OG Description (override)' }
      - { name: og_image, type: image, label: 'OG Image (override)' }
      - { name: breadcrumb_name, type: string, label: 'Breadcrumb Label (override)' }
      - { name: jsonld_name, type: string, label: 'JSON-LD Name (override)' }
      - { name: primary_image_width, type: number, label: Image Width }
      - { name: primary_image_height, type: number, label: Image Height }
      - { name: twitter_data1, type: string, label: Twitter Reading Time }
      - { name: permalink, type: string, label: Permalink, hidden: true }
      - { name: layout, type: string, label: Layout, hidden: true }
      - { name: body_class, type: string, label: Body Class, hidden: true }

  - name: categories
    label: Categories
    path: categories
    type: collection
    subfolders: false
    filename: "{primary}.md"
    view:
      fields: [cat_head_title, title]
      primary: cat_head_title
      sort: [cat_head_title]
    fields:
      - { name: cat_head_title, type: string, label: Short Title }
      - { name: title, type: string, label: Page Title (SEO) }
      - { name: meta_description, type: string, label: SEO Description }
      - { name: description, label: Description, type: rich-text, options: { format: markdown } }
      - { name: cat_head_style, type: string, label: Header Style (CSS) }
      - { name: loop_class, type: string, label: Loop CSS Class }
      - name: product_slugs
        label: Products
        type: reference
        options:
          collection: products
          multiple: true
          search: "title"
          value: "{filename}"
          label: "{title}"
      - { name: primary_image, type: image, label: Primary Image }
      - { name: primary_image_width, type: number, label: Primary Image Width }
      - { name: primary_image_height, type: number, label: Primary Image Height }
      - { name: primary_image_caption, type: string, label: Primary Image Caption }
      - name: redirect_from
        label: Redirect From (legacy URLs)
        type: string
        list: true
      - { name: og_title, type: string, label: 'OG Title (override)' }
      - { name: og_description, type: string, label: 'OG Description (override)' }
      - { name: og_image, type: image, label: 'OG Image (override)' }
      - { name: breadcrumb_name, type: string, label: 'Breadcrumb Label (override)' }
      - { name: jsonld_name, type: string, label: 'JSON-LD Name (override)' }
      - { name: jsonld_breadcrumb_name, type: string, label: 'JSON-LD Breadcrumb (override)' }
      - { name: permalink, type: string, label: Permalink, hidden: true }
      - { name: layout, type: string, label: Layout, hidden: true }
      - { name: body_class, type: string, label: Body Class, hidden: true }

  - name: areas-covered
    label: Areas Covered
    path: areas-covered
    type: collection
    subfolders: false
    exclude: ["index.html"]
    filename: "{primary}.md"
    view:
      fields: [title, page_title]
      primary: title
      sort: [title]
    fields:
      - { name: title, type: string, label: Area Name }
      - { name: page_title, type: string, label: Page Heading }
      - { name: meta_title, type: string, label: SEO Title }
      - { name: description, type: string, label: SEO Description }
      - { name: intro_body, label: Intro (above related links), type: rich-text, options: { format: markdown } }
      - { name: closing_body, label: Closing (below related links), type: rich-text, options: { format: markdown } }
      - { name: area_testimonial, type: string, label: Testimonial Slug }
      - { name: primary_image, type: image, label: Primary Image }
      - { name: primary_image_width, type: number, label: Primary Image Width }
      - { name: primary_image_height, type: number, label: Primary Image Height }
      - { name: primary_image_caption, type: string, label: Primary Image Caption }
      - name: redirect_from
        label: Redirect From (legacy URLs)
        type: string
        list: true
      - { name: og_type, type: string, label: 'OG Type' }
      - { name: og_title, type: string, label: 'OG Title' }
      - { name: og_description, type: string, label: 'OG Description' }
      - { name: og_image, type: image, label: 'OG Image' }
      - { name: breadcrumb_name, type: string, label: 'Breadcrumb Label (override)' }
      - { name: tags, type: string, label: Tags, hidden: true }
      - { name: permalink, type: string, label: Permalink, hidden: true }
      - { name: layout, type: string, label: Layout, hidden: true }
      - { name: body_class, type: string, label: Body Class, hidden: true }

  - name: reviews
    label: Reviews
    path: reviews
    type: collection
    subfolders: false
    view:
      fields: [name, role, date, rating]
      primary: name
      sort: [date]
    fields:
      - { name: name, type: string, label: Name }
      - { name: role, type: string, label: Role / Company }
      - { name: url, type: string, label: URL }
      - { name: rating, type: number, label: Rating (1-5) }
      - { name: date, type: date, label: Date }
      - { name: body, label: Body, type: code, options: { language: markdown } }
      - { name: legacy, type: boolean, label: Legacy testimonial }
      - { name: hidden, type: boolean, label: Hidden }
      - name: products
        label: Products
        type: reference
        options:
          collection: products
          multiple: true
          search: "title"
          value: "{path}"
          label: "{title}"
        
  - name: events
    label: Events
    path: events
    type: collection
    subfolders: false
    filename: "{primary}.md"
    view:
      fields: [title, event_date, recurring_date, event_location]
      primary: title
      sort: [title]
    fields:
      - { name: header_image, type: image, label: Header Image }
      - { name: title, type: string, label: Title }
      - { name: subtitle, type: string, label: Subtitle }
      - { name: event_date, label: Event Date, type: date, required: false }
      - { name: recurring_date, type: string, label: Recurring Date (e.g. "Every Friday at 2 PM"), required: false }
      - { name: event_location, type: string, label: Event Location }
      - { name: body, label: Body, type: code, options: { language: markdown } }
      - { name: header_text, type: string, label: Header Text }
      - { name: meta_title, type: string, label: Meta Title }
      - { name: meta_description, type: string, label: Meta Description }

  - name: snippets
    label: Snippets
    path: snippets
    type: collection
    subfolders: false
    filename: '{primary}.md'
    fields:
      - { name: name, type: string, label: Name }
      - { name: body, label: Body, type: code, options: { language: markdown } }

  - name: site
    label: Site Configuration
    type: file
    path: _data/site.json
    fields:
      - { name: name, type: string, label: Site Name }
      - { name: url, type: string, label: Site URL }
      - name: opening_times
        label: Opening Times
        type: object
        list: true
        fields:
          - { name: day, type: string, label: Day, required: true }
          - { name: hours, type: string, label: Hours, required: true }
      - name: socials
        label: Social Media Links
        type: object
        fields:
          - { name: Github, type: string, label: Github }
          - { name: Forgejo, type: string, label: Forgejo }
          - { name: Facebook, type: string, label: Facebook }
          - { name: Instagram, type: string, label: Instagram }
          - { name: TikTok, type: string, label: TikTok }
          - { name: Google, type: string, label: Google }
          - { name: WhatsApp, type: string, label: WhatsApp }
          - { name: RSS, type: string, label: RSS }
      - { name: map_embed_src, type: string, label: Map Embed URL }
      
  - name: meta
    label: Meta Configuration
    type: file
    path: _data/meta.json
    fields:
      - { name: language, type: string, label: Language Code, default: "en-GB" }
      - name: organization
        label: Organization
        type: object
        fields:
          - { name: description, type: string, label: Organization Description }
          - { name: legalName, type: string, label: Legal Name }
          - { name: foundingDate, type: string, label: Founding Date }
          - name: founders
            label: Founders
            type: object
            list: true
            fields:
              - { name: name, type: string, label: Name }
          - name: address
            label: Address
            type: object
            fields:
              - { name: streetAddress, type: string, label: Street Address }
              - { name: addressLocality, type: string, label: City }
              - { name: addressRegion, type: string, label: Region/State }
              - { name: postalCode, type: string, label: Postal Code }
              - { name: addressCountry, type: string, label: Country Code }
          - name: contactPoint
            label: Contact Points
            type: object
            list: true
            fields:
              - { name: telephone, type: string, label: Telephone }
              - { name: contactType, type: string, label: Contact Type }
              - { name: areaServed, type: string, label: Area Served }
              - { name: availableLanguage, type: string, label: Available Languages, list: true }
